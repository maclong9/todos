<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <!-- Background Elements -->
  <circle cx="600" cy="400" r="350" fill="#FF6B6B" opacity="0.1"/>
  <circle cx="600" cy="400" r="250" fill="#FF6B6B" opacity="0.05"/>
  
  <!-- Secondary Cards (for depth) -->
  <g transform="translate(200, 200) rotate(5)">
    <rect x="0" y="0" width="500" height="500" rx="30" fill="white" opacity="0.7" filter="drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1))"/>
  </g>
  <g transform="translate(600, 150) rotate(10)">
    <rect x="0" y="0" width="500" height="500" rx="30" fill="white" opacity="0.5" filter="drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1))"/>
  </g>
  
  <!-- Main Todo List Card -->
  <g transform="translate(400, 100) rotate(15)">
    <rect x="0" y="0" width="500" height="550" rx="30" fill="white" filter="drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1))"/>
    
    <!-- List Items -->
    <g transform="translate(50, 70)">
      <!-- Item 1 -->
      <circle cx="20" cy="20" r="15" fill="none" stroke="#333333" stroke-width="3"/>
      <path d="M13,20 L18,25 L28,15" stroke="#333333" stroke-width="3" fill="none"/>
      <line x1="60" y1="20" x2="380" y2="20" stroke="#333333" stroke-width="8" stroke-opacity="0.2"/>
      
      <!-- Item 2 -->
      <circle cx="20" cy="80" r="15" fill="none" stroke="#333333" stroke-width="3"/>
      <path d="M13,80 L18,85 L28,75" stroke="#333333" stroke-width="3" fill="none"/>
      <line x1="60" y1="80" x2="340" y2="80" stroke="#333333" stroke-width="8" stroke-opacity="0.2"/>
      
      <!-- Item 3 -->
      <circle cx="20" cy="140" r="15" fill="none" stroke="#333333" stroke-width="3"/>
      <line x1="60" y1="140" x2="400" y2="140" stroke="#333333" stroke-width="8" stroke-opacity="0.2"/>
      
      <!-- Item 4 -->
      <circle cx="20" cy="200" r="15" fill="none" stroke="#333333" stroke-width="3"/>
      <line x1="60" y1="200" x2="360" y2="200" stroke="#333333" stroke-width="8" stroke-opacity="0.2"/>
    </g>
  </g>
  
  <!-- Swift Bird -->
  <g transform="translate(900, 300) scale(2.5) rotate(-25)">
    <!-- Wing -->
    <path d="M40,-5 C30,-25 10,-30 0,-20 C10,-15 25,-10 40,-5" fill="#FF9F1C"/>
    <path d="M35,-8 C25,-25 10,-28 5,-20 C12,-15 25,-12 35,-8" fill="#FFB84C"/>
    <!-- Body -->
    <path d="M0,0 C30,-20 60,-15 80,0 C60,15 30,20 0,0 Z" fill="#FF9F1C"/>
    <path d="M-10,-5 C20,-25 50,-20 70,-5 C50,10 20,15 -10,-5 Z" fill="#FFB84C"/>
    <!-- Bird Eye -->
    <circle cx="65" cy="-2" r="3" fill="#333333"/>
  </g>
  
  <!-- Decorative Elements -->
  <circle cx="150" cy="150" r="20" fill="#FF6B6B" opacity="0.2"/>
  <circle cx="1000" cy="650" r="30" fill="#FF6B6B" opacity="0.2"/>
  <circle cx="1100" cy="200" r="15" fill="#FF6B6B" opacity="0.2"/>
  <circle cx="200" cy="700" r="25" fill="#FF6B6B" opacity="0.2"/>
  <circle cx="900" cy="500" r="20" fill="#FF6B6B" opacity="0.2"/>
</svg>
